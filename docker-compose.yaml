services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - internal

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    restart: unless-stopped
    expose:
      - "8081"        # فقط داخل شبکه داکر — Traefik از همین‌جا بهش وصل میشه
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
    depends_on:
      - mongodb
    networks:
      - internal

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    expose:
      - "5678"        # فقط داخل شبکه داکر — Traefik از همین‌جا بهش وصل میشه
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # نگه‌داری اجراها: ۳ روز اخیر یا حداکثر ۵۰۰۰ اجرا (هرکدام زودتر رسید)
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=72
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=5000
      # هم موفق‌ها هم خطاها ذخیره شوند؛ ولی progress و اجراهای دستی نه
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_PROGRESS=false
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=false
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  arbitrage:
    build: ./arbitrage_main
    container_name: arbitrage
    restart: unless-stopped
    expose:
      - "8000"        
    networks:
      - internal

  arbitrage_wallet:
    build: ./arbitrage_wallet
    container_name: arbitrage_wallet
    restart: unless-stopped
    expose:
      - "8000"        
    networks:
      - internal

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  n8n_data:
    external: true

networks:
  internal:
    driver: bridge