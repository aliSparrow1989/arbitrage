services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: n8n
      MONGO_INITDB_ROOT_PASSWORD: lcNkFwcwGzjX
      MONGO_INITDB_DATABASE: n8n_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - internal

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: n8n
      ME_CONFIG_MONGODB_ADMINPASSWORD: lcNkFwcwGzjX
      ME_CONFIG_MONGODB_URL: mongodb://n8n:lcNkFwcwGzjX@mongodb:27017/
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: n8n
      ME_CONFIG_BASICAUTH_PASSWORD: lcNkFwcwGzjX
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
    depends_on:
      - mongodb
    networks:
      - internal

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Tehran
      - N8N_PROTOCOL=http
      - N8N_HOST=https://hl.latinoscloud.com
      - WEBHOOK_URL=https://hl.latinoscloud.com/
    volumes:
      - n8n_data:/home/node/.n8n
      - /home/n8n/images:/files
    networks:
      - internal

  arbitrage:
    build: ./arbitrage_main
    container_name: arbitrage
    restart: unless-stopped
    expose:
      - "8000"        # فقط داخل شبکه داکر — n8n مستقیم بهش وصل میشه
    networks:
      - internal

  arbitrage_wallet:
    build: ./arbitrage_wallet
    container_name: arbitrage_wallet
    restart: unless-stopped
    expose:
      - "8000"        # فقط داخل شبکه داکر — n8n مستقیم بهش وصل میشه
    networks:
      - internal

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  n8n_data:
    external: true

networks:
  internal:
    driver: bridge