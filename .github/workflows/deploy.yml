name: Deploy to production

# هر بار که چیزی به main پوش/merge شود، deploy خودکار اجرا می‌شود.
on:
  push:
    branches: [main]

# جلوگیری از اجرای هم‌زمان دو deploy؛ اگر یکی در حال اجراست، بعدی صبر می‌کند.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # روی runnerِ self-hosted که روی خود سرور نصب شده اجرا می‌شود.
    runs-on: self-hosted
    steps:
      - name: Pull latest code and redeploy
        run: |
          set -e
          cd ~/arbitrage
          git fetch origin main
          git reset --hard origin/main
          docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d --build
          docker image prune -f
