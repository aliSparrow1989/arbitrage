name: Deploy to staging

# هر بار که چیزی به stage پوش شود، روی سرور staging deploy می‌شود.
on:
  push:
    branches: [stage]

# جلوگیری از اجرای هم‌زمان دو deploy روی staging.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    # فقط runnerِ سرور staging (که با لیبل «staging» نصب شده) این job را برمی‌دارد.
    # runnerِ سرور production این لیبل را ندارد، پس هیچ‌وقت اینجا اجرا نمی‌شود.
    runs-on: [self-hosted, staging]
    steps:
      - name: Pull latest code and redeploy
        run: |
          set -e
          cd ~/arbitrage
          git fetch origin stage
          git reset --hard origin/stage
          docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d --build
          docker image prune -f
