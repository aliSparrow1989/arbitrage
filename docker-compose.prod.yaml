services:
  traefik:
    image: traefik:v3.6.2
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ARVANCLOUD_API_KEY=${ARVANCLOUD_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yaml:ro
      - ./traefik_letsencrypt:/letsencrypt
    depends_on:
      - n8n
      - mongo-express
    networks:
      - internal

  n8n:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_HOST}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=arvanresolver"
      - "traefik.http.routers.n8n.tls.domains[0].main=${BASE_DOMAIN}"
      - "traefik.http.routers.n8n.tls.domains[0].sans=*.${BASE_DOMAIN}"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  mongo-express:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mongo.rule=Host(`${MONGO_DOMAIN}`)"
      - "traefik.http.routers.mongo.entrypoints=websecure"
      - "traefik.http.routers.mongo.tls.certresolver=arvanresolver"
      - "traefik.http.routers.mongo.tls.domains[0].main=${BASE_DOMAIN}"
      - "traefik.http.routers.mongo.tls.domains[0].sans=*.${BASE_DOMAIN}"
      - "traefik.http.services.mongo.loadbalancer.server.port=8081"
