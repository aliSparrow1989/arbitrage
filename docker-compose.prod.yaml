# محیط production (سرور hamidia).
# Traefik تنها سرویسی است که روی هاست پورت باز می‌کند (80/443) و TLS را با
# ArvanCloud DNS-01 challenge از Let's Encrypt خودکار می‌گیرد. دامنه روی ابر
# آروان در حالت proxy/CDN است؛ آروان SSL لبه را می‌دهد و Traefik گواهی origin را.
# n8n و mongo-express فقط داخل شبکه‌ی داکرند و Traefik از داخل به آن‌ها می‌رسد.
services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # کلید API آروان برای DNS-01. فرمت: "Apikey xxxxxxxx-...".
      - ARVANCLOUD_API_KEY=${ARVANCLOUD_API_KEY}
    volumes:
      # docker provider — خواندن labelها از کانتینرها (فقط خواندنی).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_letsencrypt:/letsencrypt
    depends_on:
      - n8n
      - mongo-express
    networks:
      - internal

  # labelهای prod روی سرویس‌های base (merge می‌شوند؛ روی dev بی‌اثرند).
  n8n:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_HOST}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=arvanresolver"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  mongo-express:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mongo.rule=Host(`${MONGO_DOMAIN}`)"
      - "traefik.http.routers.mongo.entrypoints=websecure"
      - "traefik.http.routers.mongo.tls.certresolver=arvanresolver"
      - "traefik.http.services.mongo.loadbalancer.server.port=8081"

volumes:
  traefik_letsencrypt:
    driver: local
